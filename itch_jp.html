const chapters = [
  {
    num: "はじめに",
    tag: "tag-green",
    tagText: "序論",
    title: "\"かゆくて気が狂いそう\" — この本を書いた理由",
    summary: "ソウル大学病院皮膚科の診察室で長年にわたりかゆみの患者と向き合ってきた。短い診察時間では説明しきれなかったことをこの本に込めた。原因を見つけて取り除けば、かゆみは必ず治る。",
    detail: `かゆみはとても一般的で、本当につらい症状です。患者さんから一番よく聞く言葉は「かゆくて気が狂いそう」または「かゆくてまったく眠れない」というものでした。

かゆみを引き起こす原因は必ずあります。医師と患者が最初にすべきことは、かゆみの原因を探ることです。原因を治療せずに薬だけでかゆみを抑えると、薬をやめたときに必ず再発します。

「薬を使うと少し良くなるだけです。」「何度もかゆくなって繰り返します。」なぜかゆみは治療が難しいのでしょうか。それはかゆみの原因を見つけて取り除かずに、かゆいという症状だけを治療しているからです。

この本は皮膚がかゆくて悩んでいる方々に、かゆみから解放される効果的な方法を紹介するために書き始めました。ソウル大学病院でかゆみを訴える多くの患者さんを診察してきた中で、短い診察時間ではすべてを説明できなかったという残念な思いをこの本に込めました。

一度読んでは理解しにくい内容もあるかもしれません。何度も繰り返し丁寧に読み、この本で説明する方法を日常生活の中でしっかり実践することをお勧めします。`,

    detail: `かゆみの最もよくある重要な原因は乾燥肌です。しかしほとんどの患者さんは、乾燥肌が自分のかゆみの原因だということを知りません。

    detail: `皮膚疾患がかゆみの原因の場合、どんな皮膚疾患かを正確に診断してきちんと治療すれば、かゆみを治すことができます。

  {

    summary: "垢すりをしない。石鹸泡を長く擦らない。固形石鹸の代わりに弱酸性クレンザーを使う。シャワー時間を短くする。保湿剤を1日2回以上塗る。室内湿度50%以上・温度20〜22℃を維持する。",
    detail: `かゆみを予防・治療するには毎日11のことを実践しなければなりません。基本原則は「自分の肌の油膜を厚く保つ」という考え方です。

第一に、入浴時に垢すりをしません。垢すりは皮膚の油膜である角質層を削り取る行為です。石鹸泡で洗っていない皮膚からこすれて出てくるものは垢ではなく角質層です。皮膚科医は決して垢すりをしません。

第二に、石鹸泡を長く擦りません。手のひらに石鹸泡を立ててから汚れた部分にだけ軽く当てる程度にします。

第三に、固形石鹸の代わりに弱酸性クレンザーを使います。肌の正常なpHはpH5〜5.5の弱酸性です。固形石鹸はアルカリ性なので肌の健康に良くありません。

第五に、熱いお湯に入りません。熱いお湯は角質層の油膜構造を変化させて水分の損失を増やします。

第六に、シャワー後に水気を拭くとき擦らずに軽く叩いて乾かします。

第七に、保湿剤を1日2回以上塗ります。「肌が油を作れないから代わりに塗ってあげる」と思って毎日塗ります。コレステロール・セラミド・脂肪酸が1:1:1の比率で含まれた保湿剤が良いです。洗い流さずに重ね塗りして肌の油膜を厚く保ちます。

第八に、室内湿度を50パーセント以上に保ちます。マンションの冬の室内湿度は20パーセント以下に下がることもあります。加湿器を各部屋に置いて湿度計で常に確認します。

第十一に、かゆみを減らすためにアルコールを塗るのをやめます。アルコールは皮膚の油膜を損傷させてさらに乾燥し、さらにかゆくなります。`,

「不思議です。先生がおっしゃった通りにしたら、3年間苦しんでいたかゆみが2ヶ月でほぼ良くなりました。お風呂の代わりに3日に1回簡単にシャワーをして、石鹸も汚れた部分だけに使いながら1日3回保湿剤をたっぷり塗りました。加湿器を1日中つけていました。絶対に掻かないよう努力しました。」— 70歳の患者さんの言葉

かゆみの原因を見つけ、自ら努力してかゆみを必ず治すという強い意志を持ち、きちんと治療を受ければ良くなるという希望的でポジティブな考えを持てば、かゆみも軽くなり健康な生活を送ることができるでしょう。`,
    quote: "かゆみを引き起こす原因は必ずあります。原因を見つけてそれを取り除くことが、成功的にかゆみを治療する方法です。5ステップ原則をよく守れば、必ずかゆみを治療して再発を防ぐことができます。 — チョン・ジンホ"
  }
];

const list = document.getElementById('chapterList');

// ── TTS 상태 변수 ──
let currentTTS = null;       // 재생 중인 챕터 인덱스 (-1 = 전체 듣기)
let isPaused = false;        // 일시정지 여부
let sentences = [];          // 문장 배열
let currentSentenceIdx = 0;  // 현재 문장 인덱스
let ttsInterval = null;      // 프로그레스 타이머
let isListenAll = false;     // 전체 듣기 모드 여부

function renderCards() {
  list.innerHTML = '';
  chapters.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header" onclick="toggleCard(${i})">
        <div class="card-header-main">
          <div class="card-num">${ch.num}</div>
          <div class="card-header-text">
            <span class="card-tag ${ch.tag}">${ch.tagText}</span>
            <div class="card-title">${ch.title}</div>
            <div class="card-summary">${ch.summary}</div>
          </div>
        </div>
        <div class="toggle-icon-wrap">
          <div class="toggle-icon">
            <svg viewBox="0 0 14 14" fill="none">
              <path d="M2 4.5L7 9.5L12 4.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="toggle-label-open">詳しく見る</span>
            <span class="toggle-label-close">閉じる</span>
          </div>
        </div>
      </div>
      <div class="card-detail">
        <div class="detail-inner">
          <div class="tts-bar">
            <button class="btn-tts" id="tts-${i}" onclick="toggleTTS(${i}, event)">
              <svg class="play-icon" viewBox="0 0 24 24" fill="none">
                <path d="M3 9v6h4l5 5V4L7 9H3z" fill="currentColor"/>
                <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor"/>
                <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z" fill="currentColor"/>
              </svg>
              <svg class="stop-icon" viewBox="0 0 24 24" fill="none">
                <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
              </svg>
              <span class="play-icon">詳しく聴く</span>
              <span class="stop-icon">停止</span>
            </button>
          </div>
          <div class="tts-progress" id="prog-${i}">
            <div class="tts-progress-fill" id="progfill-${i}"></div>
          </div>
          <div class="detail-label">詳細内容</div>
          <div class="detail-text">${ch.detail.replace(/\n\n/g, '</p><p>').replace(/^/, '<p>').replace(/$/, '</p>')}</div>
          <div class="detail-quote">${ch.quote}</div>
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

renderCards();

function toggleCard(i) {
  const cards = document.querySelectorAll('.card');
  const card = cards[i];
  const isActive = card.classList.contains('active');
  if (isActive) stopTTS();
  card.classList.toggle('active');

  if (!isActive) {
    setTimeout(() => {
      const ttsBtn = document.getElementById('tts-' + i);
      if (!ttsBtn) return;
      const btnRect = ttsBtn.getBoundingClientRect();
      const viewH = window.innerHeight;
      if (btnRect.bottom > viewH - 20) {
        const shift = btnRect.bottom - viewH + 60;
        window.scrollBy({ top: shift, behavior: 'smooth' });
      }
    }, 320);
  }
}

// ── 문장 분리 (한국어 종결 기준) ──
function splitSentences(text) {
  return text.split(/(?<=[.!?。！？다요까죠네군]\s)/).map(s => s.trim()).filter(Boolean);
}

function buildTTSText(i) {
  const ch = chapters[i];
  return `${ch.title}. ${ch.detail} ${ch.quote}`;
}

// ── 플로팅 바 업데이트 ──
function updateFloatBar(show, title, pct, paused) {
  const bar = document.getElementById('float-bar');
  if (!show) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  document.getElementById('float-fill').style.width = (pct || 0) + '%';

  const toggleBtn = document.getElementById('float-toggle-btn');
  const iconPause = document.getElementById('float-icon-pause');
  const iconResume = document.getElementById('float-icon-resume');
  const label = document.getElementById('float-btn-label');

  if (paused) {
    // 일시정지 상태 → 버튼에 "이어듣기" 표시
    toggleBtn.classList.add('paused');
    iconPause.style.display = 'none';
    iconResume.style.display = 'block';
    label.textContent = '再生再開';
  } else {
    // 재생 중 → 버튼에 "일시정지" 표시
    toggleBtn.classList.remove('paused');
    iconPause.style.display = 'block';
    iconResume.style.display = 'none';
    label.textContent = '一時停止';
  }
}

// ── 문장 하나씩 재생 (재귀) ──
function speakSentence(idx) {
  if (idx >= sentences.length) {
    // 전체 완료
    const fill = currentTTS !== null ? document.getElementById('progfill-' + currentTTS) : null;
    if (fill) fill.style.width = '100%';
    document.getElementById('float-fill').style.width = '100%';
    setTimeout(stopTTS, 500);
    return;
  }

  const utter = new SpeechSynthesisUtterance(sentences[idx]);
  utter.lang = 'ja-JP';
  utter.rate = 0.92;
  utter.pitch = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const koVoice = voices.find(v => v.lang.startsWith('ja'));
  if (koVoice) utter.voice = koVoice;

  utter.onstart = () => {
    currentSentenceIdx = idx;
    // 프로그레스 업데이트
    const pct = Math.round((idx / sentences.length) * 100);
    if (currentTTS !== null) {
      const fill = document.getElementById('progfill-' + currentTTS);
      if (fill) fill.style.width = pct + '%';
    }
    document.getElementById('float-fill').style.width = pct + '%';
    updateFloatBar(true, chapters[currentTTS]?.title, pct, false);
  };

  utter.onend = () => {
    if (isPaused) return; // 일시정지 중이면 다음 문장 안 넘어감
    speakSentence(idx + 1);
  };

  utter.onerror = (e) => {
    if (e.error === 'interrupted' || e.error === 'canceled') return;
    stopTTS();
  };

  window.speechSynthesis.speak(utter);
}

// ── 플로팅 바의 일시정지/이어듣기 버튼 ──
function floatTogglePause() {
  if (currentTTS === null) return;

  if (!isPaused) {
    // 일시정지 — isPaused를 먼저 true로 설정해야 onend에서 다음 문장으로 넘어가지 않음
    isPaused = true;
    window.speechSynthesis.cancel();
    const btn = document.getElementById('tts-' + currentTTS);
    if (btn) { btn.classList.remove('playing'); }
    const pct = Math.round((currentSentenceIdx / sentences.length) * 100);
    updateFloatBar(true, null, pct, true);
    if (isListenAll) updateListenAllBtn('paused');
  } else {
    // 이어듣기 — 멈춘 문장부터 재시작
    isPaused = false;
    const btn = document.getElementById('tts-' + currentTTS);
    if (btn) { btn.classList.add('playing'); }
    const pct = Math.round((currentSentenceIdx / sentences.length) * 100);
    updateFloatBar(true, null, pct, false);
    if (isListenAll) updateListenAllBtn('playing');
    speakSentence(currentSentenceIdx);
  }
}

function updateListenAllBtn(state) {
  // state: 'idle' | 'playing' | 'paused'
  const btn      = document.getElementById('btn-listen-all');
  const iconPlay  = document.getElementById('listen-all-icon-play');
  const iconPause = document.getElementById('listen-all-icon-pause');
  const iconResume= document.getElementById('listen-all-icon-resume');
  const label    = document.getElementById('listen-all-label');
  const sub      = document.getElementById('listen-all-sub');

  btn.classList.remove('playing', 'paused-all');
  iconPlay.style.display = iconPause.style.display = iconResume.style.display = 'none';

  if (state === 'playing') {
    btn.classList.add('playing');
    iconPause.style.display = 'block';
    label.textContent = '一時停止';
    sub.textContent   = '再生中 — タップで一時停止';
  } else if (state === 'paused') {
    btn.classList.add('paused-all');
    iconResume.style.display = 'block';
    label.textContent = '再生再開';
    sub.textContent   = '一時停止中 — タップで再開';
  } else {
    iconPlay.style.display = 'block';
    label.textContent = '全て聴く';
    sub.textContent   = 'はじめから第5ステップまで全て再生';
  }
}

// ── 완전 정지 ──
function stopTTS() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (ttsInterval) { clearInterval(ttsInterval); ttsInterval = null; }
  document.querySelectorAll('.btn-tts').forEach(b => b.classList.remove('playing'));
  document.querySelectorAll('.tts-progress').forEach(p => p.classList.remove('visible'));
  document.querySelectorAll('.tts-progress-fill').forEach(f => f.style.width = '0%');
  updateFloatBar(false);
  currentTTS = null;
  isPaused = false;
  sentences = [];
  currentSentenceIdx = 0;
  // 전체 듣기 버튼 초기화
  isListenAll = false;
  updateListenAllBtn('idle');
}

// ── 자세히 듣기 버튼 ──
function toggleTTS(i, e) {
  e.stopPropagation();
  if (!window.speechSynthesis) {
    const banner = document.getElementById('tts-banner');
    if (banner) { banner.style.display = 'block'; setTimeout(() => banner.style.display = 'none', 4000); }
    return;
  }

  // 같은 챕터 재생 중 → 정지
  if (currentTTS === i) { stopTTS(); return; }

  stopTTS();

  // 스크롤
  setTimeout(() => {
    const bar = document.getElementById('prog-' + i);
    if (!bar) return;
    const barRect = bar.getBoundingClientRect();
    const viewH = window.innerHeight;
    if (barRect.top > viewH * 0.5) {
      window.scrollBy({ top: 160, behavior: 'smooth' });
    }
  }, 80);

  const text = buildTTSText(i);
  sentences = splitSentences(text);
  currentSentenceIdx = 0;
  currentTTS = i;
  isPaused = false;

  const prog = document.getElementById('prog-' + i);
  const btn = document.getElementById('tts-' + i);
  prog.classList.add('visible');
  btn.classList.add('playing');
  updateFloatBar(true, chapters[i].title, 0, false);

  speakSentence(0);
}

// ── 전체 듣기 ──
function buildAllText() {
  return chapters.map(ch => `${ch.title}. ${ch.detail} ${ch.quote}`).join(' ');
}

function toggleListenAll() {
  if (!window.speechSynthesis) {
    const banner = document.getElementById('tts-banner');
    if (banner) { banner.style.display = 'block'; setTimeout(() => banner.style.display = 'none', 4000); }
    return;
  }

  // 이미 전체 듣기 재생 중 → 일시정지 / 이어듣기 토글
  if (isListenAll && currentTTS === -1) {
    floatTogglePause();
    updateListenAllBtn(isPaused ? 'paused' : 'playing');
    return;
  }

  // 다른 챕터 재생 중이었으면 정지 후 전체 듣기 시작
  stopTTS();

  isListenAll = true;
  currentTTS = -1;  // -1 = 전체 듣기 전용 인덱스
  sentences = splitSentences(buildAllText());
  currentSentenceIdx = 0;
  isPaused = false;

  updateListenAllBtn('playing');
  updateFloatBar(true, null, 0, false);
  speakSentence(0);
}

window.speechSynthesis && window.speechSynthesis.addEventListener
  && window.speechSynthesis.addEventListener('voiceschanged', () => {});

// 카카오톡 인앱브라우저 감지 → 즉시 크롬으로 강제 이동
(function() {
  const ua = navigator.userAgent.toLowerCase();
  const isInApp = ua.includes('kakaotalk') || ua.includes('naver') ||
                  ua.includes('instagram') || ua.includes('fbios') || ua.includes('fban');
  if (isInApp) {
    const currentUrl = location.href;
    if (ua.includes('android')) {
      location.href = 'intent://' + currentUrl.replace(/https?:\/\//, '') +
        '#Intent;scheme=https;package=com.android.chrome;end';
    } else if (ua.includes('iphone') || ua.includes('ipad')) {
      location.href = currentUrl.replace('https://', 'googlechrome://');
      setTimeout(() => {
        alert('크롬 앱이 없으면 사파리 주소창에\n' + currentUrl + '\n을 직접 입력해주세요.');
      }, 1500);
    }
  }
})();

window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTop');
  btn.classList.toggle('visible', window.scrollY > 400);
});
</script>
